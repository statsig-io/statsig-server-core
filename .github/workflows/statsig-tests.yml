name: Tests

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  FORCE_COLOR: true
  test_api_key: ${{ secrets.KONG_SERVER_SDK_KEY }}

jobs:
  run-bindings-tests:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        lang:
          - python
          - node
          - java
          - rust
          - php
          - dotnet
          - go
          - elixir
          - cpp

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 7.32.4

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.lang }}

      - name: Install NPM Dependencies
        run: pnpm install --dir cli

      - name: '[Python] Install Dependencies'
        if: matrix.lang == 'python'
        # includes legacy python sdk for comparison
        run: pip3 install pytest maturin patchelf pytest_httpserver pytest-retry statsig
      
      - name: Setup elixir
        uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        if: ${{  matrix.lang == 'elixir' }}
        with:
          elixir-version: 1.18.4
          otp-version: '28.0'

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: '[Rust] Install cargo-nextest'
        if: matrix.lang == 'rust'
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      # The rust job builds two feature-set variants of the statsig-rust test
      # binaries back-to-back (full debug info, on top of a restored target/
      # cache). On ubuntu-latest only ~21GB is free on / where target/ lives,
      # and the second (with_zstd) set used to exhaust the disk -- lld then
      # faulted writing its mmap'd output, dying with
      # "ld terminated with signal 7 [Bus error]". Reclaim the preinstalled
      # toolchains the rust tests don't use so both sets fit.
      - name: '[Rust] Free up disk space'
        if: matrix.lang == 'rust'
        run: |
          rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/swift \
            /usr/local/share/boost || true

      - name: Run Tests
        run: ./tore test ${{ matrix.lang }} --no-docker --arch x86_64 --os debian

      - name: Upload Artifacts
        if: matrix.lang == 'rust'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.lang }}-test-outputs
          if-no-files-found: error
          path: |
            /tmp/test_all_gate_checks_perf.json

  perf-report:
    needs: run-bindings-tests
    if: false # disabled for now
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/common-setup

      - name: Perf Report
        shell: bash
        run: ./tore perf-report \
          --should-persist ${{ github.event_name == 'release' || github.ref_name == 'main' }} \
          --workflow-run-id ${{ github.run_id }}
